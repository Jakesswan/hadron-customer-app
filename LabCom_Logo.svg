<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-label="LabCom logo">
  <!-- Radial gradient for the central sphere -->
  <defs>
    <radialGradient id="sphereGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%"  stop-color="#aedcff"/>
      <stop offset="35%" stop-color="#4c86ff"/>
      <stop offset="100%" stop-color="#1a3d9e"/>
    </radialGradient>
  </defs>

  <!-- Gray "L" frame (top of logo) -->
  <path d="M 95 6 L 113 6 L 113 92 L 168 92 L 168 110 L 95 110 Z"
        fill="#4f4f4f"/>

  <!-- "Lab" text (right of the L) -->
  <text x="122" y="75" font-family="Arial, Helvetica, sans-serif"
        font-size="34" font-weight="800" fill="#4f4f4f" letter-spacing="1">ab</text>

  <!-- "Com" text (below) -->
  <text x="122" y="110" font-family="Arial, Helvetica, sans-serif"
        font-size="28" font-weight="800" fill="#ffffff" letter-spacing="1"
        stroke="#4f4f4f" stroke-width="0.6">Com</text>

  <!-- Connection lines -->
  <line x1="96" y1="137" x2="40"  y2="72"  stroke="#4f4f4f" stroke-width="4" stroke-linecap="round"/>
  <line x1="96" y1="137" x2="40"  y2="178" stroke="#4f4f4f" stroke-width="4" stroke-linecap="round"/>
  <line x1="96" y1="137" x2="160" y2="178" stroke="#4f4f4f" stroke-width="4" stroke-linecap="round"/>

  <!-- Outer atoms -->
  <circle cx="40"  cy="72"  r="12" fill="none" stroke="#000000" stroke-width="5"/>
  <circle cx="40"  cy="178" r="12" fill="none" stroke="#e53935" stroke-width="5"/>
  <circle cx="160" cy="178" r="12" fill="none" stroke="#ffd400" stroke-width="5"/>

  <!-- Central blue sphere -->
  <circle cx="96" cy="137" r="32" fill="url(#sphereGrad)"/>
  <!-- Specular highlight on the sphere -->
  <ellipse cx="88" cy="128" rx="10" ry="6" fill="#ffffff" opacity="0.35"/>
</svg>
